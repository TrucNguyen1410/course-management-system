<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructor Portal - EduPro Online</title>
    <base href="/" />
    
    <!-- 1. BOOTSTRAP & ICONS (Quan trọng để hiện giao diện và icon) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- 2. CSS RIÊNG -->
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KhoaHocOnline.WebInstructor.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Hiệu ứng loading giữa màn hình -->
        <div style="position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); text-align:center">
            <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status"></div>
            <div class="mt-2 fw-bold text-success">Đang tải dữ liệu...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Script hỗ trợ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
